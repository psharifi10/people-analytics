models:
  - name: metricflow_time_spine
    description: >
      MetricFlow time spine table: one row per calendar day from 2020 to 2030.
      Required by the dbt semantic layer for time-series metric calculations,
      cumulative metrics, and period-over-period comparisons.
    config:
      materialized: table
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: "Calendar date (one row per day)."
        granularity: day
        tests:
          - unique
          - not_null
