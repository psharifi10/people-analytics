version: 2

models:
  - name: stg_ats__jobs
    description: "Staging pass-through for ATS jobs. Dedup handled in base layer."
    meta:
      owner: people-analytics-team
      layer: staging
      refresh_cadence: every_4h
      severity: standard
    columns:
      - name: requisition_id
        tests: [unique, not_null]

  - name: stg_ats__candidates
    description: "Staging pass-through for ATS candidates."
    meta:
      owner: people-analytics-team
      layer: staging
      refresh_cadence: every_4h
      severity: standard
    columns:
      - name: candidate_id
        tests: [unique, not_null]

  - name: stg_ats__applications
    description: "Staging pass-through for ATS applications."
    meta:
      owner: people-analytics-team
      layer: staging
      refresh_cadence: every_4h
      severity: standard
    columns:
      - name: application_id
        tests: [unique, not_null]
      - name: candidate_id
        tests: [not_null]
      - name: requisition_id
        tests: [not_null]

  - name: stg_ats__stage_events
    description: "Staging pass-through for ATS stage transition events."
    meta:
      owner: people-analytics-team
      layer: staging
      refresh_cadence: every_4h
      severity: standard
    columns:
      - name: stage_event_id
        tests: [unique, not_null]
      - name: application_id
        tests: [not_null]

  - name: stg_ats__offers
    description: "Staging pass-through for ATS offers."
    meta:
      owner: people-analytics-team
      layer: staging
      refresh_cadence: every_4h
      severity: important
    columns:
      - name: offer_id
        tests: [unique, not_null]
      - name: application_id
        tests: [not_null]
